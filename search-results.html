        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 解析URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const city = urlParams.get('city');
            const hotel = urlParams.get('hotel');
            const checkIn = urlParams.get('checkIn');
            const checkOut = urlParams.get('checkOut');
            const guests = urlParams.get('guests');
            
            // 等待组件加载完成后初始化
            setTimeout(() => {
                // 初始化搜索栏
                initSearchBar(city, hotel, checkIn, checkOut, guests);
                
                // 如果有搜索参数，自动搜索
                if (city) {
                    // 更新搜索结果统计
                    document.getElementById('resultCount').textContent = `我们在 ${city} 找到 X 家酒店`;
                    
                    // 执行搜索
                    setTimeout(() => {
                        searchHotels(city, hotel, checkIn, checkOut, guests);
                    }, 500);
                }
            }, 200);
        });
        
        // 初始化搜索栏
        function initSearchBar(city, hotel, checkIn, checkOut, guests) {
            // 填充搜索框值
            if (city) {
                const cityInput = document.getElementById('city');
                if (cityInput) {
                    cityInput.value = city;
                }
            }
            
            if (hotel) {
                const hotelInput = document.getElementById('hotel');
                if (hotelInput) {
                    hotelInput.value = hotel;
                }
            }
            
            // 初始化日期选择器
            if (checkIn && checkOut) {
                const dateDisplay = document.getElementById('dateDisplay');
                if (dateDisplay) {
                    const checkInDate = new Date(checkIn);
                    const checkOutDate = new Date(checkOut);
                    const checkInStr = `${checkInDate.getFullYear()}年${checkInDate.getMonth() + 1}月${checkInDate.getDate()}日`;
                    const checkOutStr = `${checkOutDate.getFullYear()}年${checkOutDate.getMonth() + 1}月${checkOutDate.getDate()}日`;
                    dateDisplay.textContent = `${checkInStr} - ${checkOutStr}`;
                }
            }
            
            // 初始化旅客选择
            if (guests) {
                const guestsDisplay = document.getElementById('guestsDisplay');
                if (guestsDisplay) {
                    guestsDisplay.textContent = guests;
                }
            }
        }
        
        // 搜索酒店
        async function searchHotels(city, hotel, checkIn, checkOut, guests, page = 1, sort = 'default') {
            // 解码city参数，防止多重编码
            const decodedCity = decodeURIComponent(city);
            console.log('开始搜索酒店:', decodedCity, page, sort);
            
            // 显示加载状态
            document.getElementById('resultsContainer').innerHTML = `
                <div class="text-center py-10">
                    <div class="spinner-border" role="status">
                        <span class="sr-only">加载中...</span>
                    </div>
                    <p class="mt-4">正在搜索酒店...</p>
                </div>
            `;
            document.getElementById('resultsContainer').classList.remove('hidden');
            // 不再需要处理emptyState，因为已经删除了该元素
            
            try {
                // 调用API获取数据
                const url = `/api/search?city=${encodeURIComponent(decodedCity)}&page=${page}&limit=10&sort=${sort}&hotel=${encodeURIComponent(hotel || '')}&checkIn=${encodeURIComponent(checkIn || '')}&checkOut=${encodeURIComponent(checkOut || '')}&guests=${encodeURIComponent(guests || '')}`;
                console.log('API请求URL:', url);
                
                const response = await fetch(url);
                console.log('API响应状态:', response.status);
                
                // 检查响应状态
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API返回数据:', data);
                
                // 验证数据结构
                if (data && data.success && data.data) {
                    // 提取数据
                    let total = data.data.total || 0;
                    let hotels = data.data.hotels || [];
                    const returnedPage = data.data.page || page;
                    
                    // 如果指定了酒店名称，过滤酒店数据
                    if (hotel) {
                        const filteredHotels = hotels.filter(hotelItem => 
                            hotelItem.name.toLowerCase().includes(hotel.toLowerCase())
                        );
                        hotels = filteredHotels;
                        total = filteredHotels.length;
                    }
                    
                    const totalPages = Math.ceil(total / 10);
                    
                    console.log('处理后的数据 - 总数:', total, '酒店数:', hotels.length, '当前页:', returnedPage, '总页数:', totalPages);
                    
                    // 更新搜索结果统计
                    document.getElementById('resultCount').textContent = `我们在 ${decodedCity} 找到 ${total} 家酒店`;
                    
                    // 显示搜索结果
                    displayResults(hotels, total, returnedPage, totalPages, decodedCity, hotel, checkIn, checkOut, guests, sort);
                } else {
                    // API返回失败或数据格式错误，显示错误信息
                    console.log('API返回失败或数据格式错误:', data);
                    document.getElementById('resultsContainer').innerHTML = `
                        <div class="text-center py-10">
                            <p class="text-red-500">搜索失败，请稍后重试</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('搜索酒店失败:', error);
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-red-500">搜索失败，请稍后重试</p>
                    </div>
                `;
            }
        }
        
        // 将searchHotels函数添加到全局作用域，以便分页链接调用
        window.searchHotels = searchHotels;

                                        <div class="hotel-info">
                                            <h3 class="hotel-name">${hotelItem.name}</h3>
                                            <p class="hotel-address">${hotelItem.address}</p>
                                            <div class="hotel-meta">
                                                <span class="mr-3"><i class="fas fa-star stars"></i> ${hotelItem.rating} (${hotelItem.reviewCount || Math.floor(Math.random() * 10000) + 1000}条评价)</span>
                                                <span><i class="fas fa-map-marker-alt"></i> 距离市中心 ${hotelItem.distance}</span>
                                            </div>
                                            <div class="mt-3">
                                                <button class="btn btn-sm btn-outline-primary view-details-btn">查看详情</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="price-info">
                                            <h4 class="mb-3">比价结果</h4>
                                            ${hotelItem.platforms.map(platform => `
                                                <div class="platform-price ${platform.price === minPrice ? 'best-price' : ''}">
                                                    <span class="platform-name">${platform.name}</span>
                                                    <span class="platform-price-value">¥${platform.price}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        
                        fragment.appendChild(hotelCard);
                    });
                    
                    // 添加分页
                    const paginationContainer = document.createElement('div');
                    paginationContainer.className = 'col-md-12';
                    
                    // 生成分页HTML
                    let paginationHTML = `
                        <nav aria-label="Page navigation">
                            <ul class="pagination justify-content-center">
                    `;
                    
                    // 上一页
                    if (page > 1) {
                        paginationHTML += `
                            <li class="page-item">
                                <a class="page-link" href="#" data-page="${page - 1}">上一页</a>
                            </li>
                        `;
                    }
                    
                    // 页码
                    const maxPages = 5;
                    let displayPages = [];
                    
                    if (totalPages <= maxPages) {
                        // 总页数小于等于5，显示所有页码
                        for (let i = 1; i <= totalPages; i++) {
                            displayPages.push(i);
                        }
                    } else {
                        // 总页数大于5，显示当前页附近的页码
                        if (page <= 3) {
                            // 当前页在前三页，显示前5页和最后一页
                            for (let i = 1; i <= 5; i++) {
                                displayPages.push(i);
                            }
                            displayPages.push('...');
                            displayPages.push(totalPages);
                        } else if (page >= totalPages - 2) {
                            // 当前页在后三页，显示第一页和最后5页
                            displayPages.push(1);
                            displayPages.push('...');
                            for (let i = totalPages - 4; i <= totalPages; i++) {
                                displayPages.push(i);
                            }
                        } else {
                            // 当前页在中间，显示第一页、当前页附近的页码和最后一页
                            displayPages.push(1);
                            displayPages.push('...');
                            for (let i = page - 2; i <= page + 2; i++) {
                                displayPages.push(i);
                            }
                            displayPages.push('...');
                            displayPages.push(totalPages);
                        }
                    }
                    
                    // 生成页码链接
                    for (let i of displayPages) {
                        if (i === '...') {
                            paginationHTML += `
                                <li class="page-item disabled">
                                    <span class="page-link">${i}</span>
                                </li>
                            `;
                        } else {
                            paginationHTML += `
                                <li class="page-item ${i === page ? 'active' : ''}">
                                    <a class="page-link" href="#" data-page="${i}">${i}</a>
                                </li>
                            `;
                        }
                    }
                    
                    // 下一页
                    if (page < totalPages) {
                        paginationHTML += `
                            <li class="page-item">
                                <a class="page-link" href="#" data-page="${page + 1}">下一页</a>
                            </li>
                        `;
                    }
                    
                    paginationHTML += `
                            </ul>
                        </nav>
                    `;
                    
                    paginationContainer.innerHTML = paginationHTML;
                    fragment.appendChild(paginationContainer);
                    
                    // 清空容器并添加新内容
                    resultsContainer.innerHTML = '';
                    resultsContainer.appendChild(fragment);
                    
                    // 初始化收藏按钮
                    if (window.favorites) {
                        window.favorites.init();
                    }
                    
                    // 初始化查看详情按钮
                    initViewDetails();
                    
                    // 初始化分页点击事件
                    initPagination(city, hotel, checkIn, checkOut, guests, sort);
                }
            } else {
                // 显示空状态
                if (resultsContainer) {
                    resultsContainer.classList.remove('hidden');
                    resultsContainer.innerHTML = `
                        <div class="text-center py-10">
                            <p class="text-gray-600">未找到酒店，请尝试调整搜索条件</p>
                        </div>
                    `;
                }
            }
        }
        
        // 初始化分页点击事件
        function initPagination(city, hotel, checkIn, checkOut, guests, sort) {
            const pageLinks = document.querySelectorAll('.pagination .page-link[data-page]');
            pageLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const page = parseInt(this.getAttribute('data-page'));
                    searchHotels(city, hotel, checkIn, checkOut, guests, page, sort);
                });
            });
        }
        
        // 查看详情功能
        function initViewDetails() {
            const viewDetailsBtns = document.querySelectorAll('.view-details-btn');
            
            if (!viewDetailsBtns.length) return;
            
            // 为每个查看详情按钮添加点击事件
            viewDetailsBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 获取酒店卡片
                    const hotelCard = this.closest('.hotel-card');
                    if (!hotelCard) return;
                    
                    // 获取酒店信息
                    const hotelName = hotelCard.querySelector('.hotel-name').textContent;
                    const hotelAddress = hotelCard.querySelector('.hotel-address').textContent;
                    const hotelPrice = hotelCard.querySelector('.platform-price-value').textContent.replace(/[^0-9]/g, '');
                    const hotelImage = hotelCard.querySelector('.hotel-image img').src;
                    const hotelId = hotelCard.querySelector('.favorite-btn').getAttribute('data-hotel-id');
                    
                    // 构建详情页URL
                    const detailUrl = `hotel-detail.html?id=${hotelId}&name=${encodeURIComponent(hotelName)}&address=${encodeURIComponent(hotelAddress)}&price=${hotelPrice}&image=${encodeURIComponent(hotelImage)}`;
                    
                    // 在新标签页中打开详情页
                    window.open(detailUrl, '_blank');
                });
            });
        }
        
        // 筛选按钮点击事件
        document.addEventListener('DOMContentLoaded', function() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 移除同组其他按钮的active类
                    const siblings = Array.from(this.parentElement.children).filter(child => 
                        child.classList.contains('filter-btn')
                    );
                    siblings.forEach(sibling => sibling.classList.remove('active'));
                    
                    // 添加当前按钮的active类
                    this.classList.add('active');
                    
                    // 获取当前的搜索参数
                    const urlParams = new URLSearchParams(window.location.search);
                    const city = urlParams.get('city');
                    const hotel = urlParams.get('hotel');
                    const checkIn = urlParams.get('checkIn');
                    const checkOut = urlParams.get('checkOut');
                    const guests = urlParams.get('guests');
                    
                    // 确定排序方式
                    let sort = 'default';
                    const sortSection = document.querySelector('.filter-section:nth-child(1)');
                    const activeSortBtn = sortSection.querySelector('.filter-btn.active');
                    if (activeSortBtn) {
                        const sortText = activeSortBtn.textContent;
                        switch (sortText) {
                            case '价格从低到高':
                                sort = 'price_asc';
                                break;
                            case '评分从高到低':
                                sort = 'rating_desc';
                                break;
                            case '距离从近到远':
                                sort = 'distance_asc';
                                break;
                            default:
                                sort = 'default';
                        }
                    }
                    
                    // 重新搜索
                    if (city) {
                        searchHotels(city, hotel, checkIn, checkOut, guests, 1, sort);
                    }
                });
            });
        });
    </script>
</body>
</html>
